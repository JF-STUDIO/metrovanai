name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  verify:
    name: Lint, build, and critical checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.28.1
          run_install: false

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Critical flow checks
        run: pnpm test:critical

      - name: Client lint
        run: pnpm --filter metrovan-ai-client lint

      - name: Server build
        run: pnpm --filter metrovan-ai-server build

      - name: Client build
        run: pnpm --filter metrovan-ai-client build
